<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CHILONZOR PRINT ADMIN</title>

<style>
    
body{
    font-family:Arial,sans-serif;
    background:#0f172a;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:420px;
    background:#1e293b;
    padding:25px;
    border-radius:15px;
    box-shadow:0 0 20px rgba(0,0,0,.3);
}

.logo{
    width:120px;
    display:block;
    margin:0 auto 15px;
}

h2{
    text-align:center;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:8px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:14px;
    background:#00bfff;
    color:white;
    border:none;
    border-radius:8px;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#0099dd;
}

#status{
    margin-top:15px;
    text-align:center;
    color:lime;
}
</style>
</head>

<body>

<div class="container">

<img src="logo.png" class="logo">

<h2>CHILONZOR PRINT ADMIN</h2>

<input id="name" placeholder="Mahsulot nomi">

<input id="price" placeholder="Narxi">

<input type="file" id="image">

<button onclick="saveProduct()">Saqlash</button>

<p id="status"></p>

</div>

<script type="module" src="admin.js"></script>

</body>
</html>
